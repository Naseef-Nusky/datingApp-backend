services:
  postgres:
    image: postgres:16-alpine
    container_name: vantage-dating-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: datingapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - vantage_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datingapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vantage_pgdata:
